name: Sync skill branches

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  detect-and-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Detect changes and sync branches
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          echo "Changed files:"
          echo "$CHANGED"

          sync_branch() {
            local branch="$1"
            local folder="$2"
            echo "--- Syncing $branch ---"
            git checkout "$branch" 2>/dev/null || git checkout -b "$branch"
            git checkout main -- "$folder"
            git add -A
            if ! git diff --cached --quiet; then
              git commit -m "sync: update $branch from main"
              git push origin "$branch"
              echo "Pushed $branch"
            else
              echo "No changes for $branch"
            fi
            git checkout main
          }

          if echo "$CHANGED" | grep -q "外投策略生成skill/"; then
            sync_branch "skill/strategy" "外投策略生成skill/"
          fi

          if echo "$CHANGED" | grep -q "外投达人筛选skill/"; then
            sync_branch "skill/kol-screen" "外投达人筛选skill/"
          fi

          if echo "$CHANGED" | grep -q "外投小红书内容生成"; then
            sync_branch "skill/xhs" "外投小红书内容生成&审核skill/"
          fi

          if echo "$CHANGED" | grep -q "外投比价skill/"; then
            sync_branch "skill/quote" "外投比价skill/"
          fi

          if echo "$CHANGED" | grep -q "pipeline/"; then
            sync_branch "skill/pipeline" "pipeline/"
          fi

          echo "=== Sync complete ==="
